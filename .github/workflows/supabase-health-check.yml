name: Supabase Health Monitoring

on:
  schedule:
    # Run every 3 days to keep the Supabase project active
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    # Allow manual triggering for testing

jobs:
  health-check:
    name: API & Database Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Health Endpoint
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.HEALTH_CHECK_URL;
            if (!url) {
              core.setFailed('HEALTH_CHECK_URL is not set in secrets/variables');
              return;
            }
            
            const maxRetries = 3;
            const retryDelayMs = 5000;
            
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            
            for (let i = 1; i <= maxRetries; i++) {
              try {
                core.info(`Attempt ${i} of ${maxRetries}: Checking ${url}`);
                const response = await fetch(url);
                
                if (!response.ok) {
                  const errorText = await response.text();
                  throw new Error(`HTTP error! status: ${response.status} - ${errorText}`);
                }
                
                const data = await response.json();
                
                if (data.status !== 'healthy') {
                  throw new Error(`Service unhealthy: ${JSON.stringify(data)}`);
                }
                
                core.info('✅ Health check passed:');
                core.info(JSON.stringify(data, null, 2));
                return; // Success, exit the script
                
              } catch (error) {
                core.warning(`Attempt ${i} failed: ${error.message}`);
                
                if (i === maxRetries) {
                  core.setFailed(`❌ Health check failed after ${maxRetries} attempts`);
                } else {
                  core.info(`Waiting ${retryDelayMs}ms before retrying...`);
                  await sleep(retryDelayMs);
                }
              }
            }
        env:
          # Assuming the production domain is set in GitHub repository variables or secrets
          HEALTH_CHECK_URL: ${{ secrets.HEALTH_CHECK_URL || vars.HEALTH_CHECK_URL }}
